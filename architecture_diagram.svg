<svg viewBox="0 0 1200 620" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#4B5563"/>
    </marker>
  </defs>

  <rect width="1200" height="620" fill="#FAFAFA"/>
  <text x="600" y="40" text-anchor="middle" font-size="24" font-weight="700" fill="#1F2937">Intelligent Document Assistant — RAG Architecture</text>

  <!-- Row 1: Phases 1-3 -->
  <g>
    <rect x="40" y="90" width="220" height="120" rx="10" fill="#DBEAFE" stroke="#2563EB" stroke-width="2"/>
    <text x="150" y="120" text-anchor="middle" font-size="15" font-weight="700" fill="#1E3A8A">Phase 1</text>
    <text x="150" y="140" text-anchor="middle" font-size="14" fill="#1E3A8A">Document Ingestion</text>
    <text x="150" y="165" text-anchor="middle" font-size="11" fill="#1E3A8A">PDF upload</text>
    <text x="150" y="182" text-anchor="middle" font-size="11" fill="#1E3A8A">Text extraction (pypdf)</text>
    <text x="150" y="199" text-anchor="middle" font-size="11" fill="#1E3A8A">Cleaning / preprocessing</text>
  </g>

  <line x1="260" y1="150" x2="320" y2="150" stroke="#4B5563" stroke-width="2" marker-end="url(#arrow)"/>

  <g>
    <rect x="320" y="90" width="220" height="120" rx="10" fill="#D1FAE5" stroke="#059669" stroke-width="2"/>
    <text x="430" y="120" text-anchor="middle" font-size="15" font-weight="700" fill="#065F46">Phase 2</text>
    <text x="430" y="140" text-anchor="middle" font-size="14" fill="#065F46">Document Chunking</text>
    <text x="430" y="165" text-anchor="middle" font-size="11" fill="#065F46">RecursiveCharacterTextSplitter</text>
    <text x="430" y="182" text-anchor="middle" font-size="11" fill="#065F46">Semantic segments</text>
    <text x="430" y="199" text-anchor="middle" font-size="11" fill="#065F46">Compare chunk sizes</text>
  </g>

  <line x1="540" y1="150" x2="600" y2="150" stroke="#4B5563" stroke-width="2" marker-end="url(#arrow)"/>

  <g>
    <rect x="600" y="90" width="220" height="120" rx="10" fill="#FEF3C7" stroke="#D97706" stroke-width="2"/>
    <text x="710" y="120" text-anchor="middle" font-size="15" font-weight="700" fill="#92400E">Phase 3</text>
    <text x="710" y="140" text-anchor="middle" font-size="14" fill="#92400E">Embedding Generation</text>
    <text x="710" y="165" text-anchor="middle" font-size="11" fill="#92400E">sentence-transformers</text>
    <text x="710" y="182" text-anchor="middle" font-size="11" fill="#92400E">(all-MiniLM-L6-v2)</text>
    <text x="710" y="199" text-anchor="middle" font-size="11" fill="#92400E">Store vectors → FAISS</text>
  </g>

  <line x1="820" y1="150" x2="880" y2="150" stroke="#4B5563" stroke-width="2" marker-end="url(#arrow)"/>

  <g>
    <rect x="880" y="90" width="260" height="120" rx="10" fill="#EDE9FE" stroke="#7C3AED" stroke-width="2"/>
    <text x="1010" y="120" text-anchor="middle" font-size="15" font-weight="700" fill="#4C1D95">FAISS Vector Store</text>
    <text x="1010" y="145" text-anchor="middle" font-size="12" fill="#4C1D95">Persisted index of chunk</text>
    <text x="1010" y="162" text-anchor="middle" font-size="12" fill="#4C1D95">embeddings + metadata</text>
    <text x="1010" y="185" text-anchor="middle" font-size="11" fill="#4C1D95">(data/faiss_index)</text>
  </g>

  <!-- Down arrow into row 2 -->
  <line x1="1010" y1="210" x2="1010" y2="260" stroke="#4B5563" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="1010" y1="260" x2="820" y2="260" stroke="#4B5563" stroke-width="2"/>

  <!-- Row 2: Phase 4 -->
  <g>
    <rect x="600" y="290" width="220" height="120" rx="10" fill="#FCE7F3" stroke="#DB2777" stroke-width="2"/>
    <text x="710" y="320" text-anchor="middle" font-size="15" font-weight="700" fill="#9D174D">Phase 4</text>
    <text x="710" y="340" text-anchor="middle" font-size="14" fill="#9D174D">Retrieval Pipeline</text>
    <text x="710" y="365" text-anchor="middle" font-size="11" fill="#9D174D">Similarity search (top-k)</text>
    <text x="710" y="382" text-anchor="middle" font-size="11" fill="#9D174D">Rank retrieved chunks</text>
    <text x="710" y="399" text-anchor="middle" font-size="11" fill="#9D174D">Build context block</text>
  </g>

  <line x1="600" y1="350" x2="540" y2="350" stroke="#4B5563" stroke-width="2" marker-end="url(#arrow)"/>

  <g>
    <rect x="320" y="290" width="220" height="120" rx="10" fill="#FEE2E2" stroke="#DC2626" stroke-width="2"/>
    <text x="430" y="320" text-anchor="middle" font-size="15" font-weight="700" fill="#7F1D1D">Phase 5</text>
    <text x="430" y="340" text-anchor="middle" font-size="14" fill="#7F1D1D">Answer Generation</text>
    <text x="430" y="365" text-anchor="middle" font-size="11" fill="#7F1D1D">Grounded prompt template</text>
    <text x="430" y="382" text-anchor="middle" font-size="11" fill="#7F1D1D">OpenAI LLM (gpt-4o-mini)</text>
    <text x="430" y="399" text-anchor="middle" font-size="11" fill="#7F1D1D">Cited, context-aware answer</text>
  </g>

  <line x1="320" y1="350" x2="260" y2="350" stroke="#4B5563" stroke-width="2" marker-end="url(#arrow)"/>

  <g>
    <rect x="40" y="290" width="220" height="120" rx="10" fill="#E0E7FF" stroke="#4338CA" stroke-width="2"/>
    <text x="150" y="320" text-anchor="middle" font-size="15" font-weight="700" fill="#312E81">Phase 6</text>
    <text x="150" y="340" text-anchor="middle" font-size="14" fill="#312E81">Streamlit App</text>
    <text x="150" y="365" text-anchor="middle" font-size="11" fill="#312E81">Upload UI + chat interface</text>
    <text x="150" y="382" text-anchor="middle" font-size="11" fill="#312E81">Shows answer + sources</text>
    <text x="150" y="399" text-anchor="middle" font-size="11" fill="#312E81">app.py</text>
  </g>

  <!-- User at bottom -->
  <line x1="150" y1="410" x2="150" y2="460" stroke="#4B5563" stroke-width="2" marker-end="url(#arrow)"/>
  <g>
    <circle cx="150" cy="500" r="35" fill="#111827"/>
    <text x="150" y="506" text-anchor="middle" font-size="12" fill="white" font-weight="700">User</text>
  </g>
  <line x1="150" y1="465" x2="150" y2="410" stroke="none"/>

  <text x="600" y="580" text-anchor="middle" font-size="12" fill="#6B7280">
    Flow: PDF Upload → Ingestion → Chunking → Embedding/Indexing (FAISS) → Retrieval (Phase 4) → Generation (Phase 5) → Streamlit UI (Phase 6) → User
  </text>
</svg>
